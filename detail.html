<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>单词卡片展示</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="detailPage">
        <div class="detail-toolbar">
            <button class="detail-tool-btn" id="btnBack" title="返回">← 返回</button>
            <button class="detail-tool-btn" id="btnMode" title="切换展示模式">📖 全部</button>
        </div>

        <div id="detailLoading" class="detail-loading">加载中...</div>
        <div id="detailEmpty" class="detail-empty" style="display:none;">
            <p>📭 未找到该卡片，请返回重试</p>
        </div>

        <div class="detail-bg" id="detailBg"></div>
        <div class="container1" id="detailContainer">
            <div class="cards" id="detailCards"></div>
            <div class="folder" id="detailFolder">
                <div class="folder-images" id="detailFolderImages"></div>
                <div class="folder-text">
                    <p class="kicker" id="detailKicker">速记.单词卡</p>
                    <h1>
                        <span id="detailName"></span>
                        <span id="detailInfo"></span>
                    </h1>
                    <span id="detailGroupInfo">18个单词</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/gitee.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/detail.js"></script>
</body>

</html>
