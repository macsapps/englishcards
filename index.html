<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="referrer" content="no-referrer">
    <title>英语单词卡片管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="header-left">
            <h1 class="logo">📚 英语单词卡片管理</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-outline" id="btnRefresh">🔄 刷新</button>
            <button class="btn btn-primary" id="btnNew">➕ 新增卡片</button>
            <button class="btn btn-icon" id="btnConfig" title="配置">⚙️</button>
        </div>
    </header>

    <main class="main">
        <div id="loadingTip" class="loading-tip">加载中...</div>
        <div id="emptyTip" class="empty-tip" style="display:none;">
            <p>📭 暂无数据，点击「新增卡片」添加第一条数据</p>
        </div>
        <div id="cardList" class="card-list"></div>
    </main>

    <div id="configModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2>⚙️ Gitee 配置</h2>
                <button class="modal-close" data-close="configModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>私人令牌</label>
                    <input type="password" id="cfgToken" placeholder="Gitee 私人令牌">
                    <small>在 Gitee → 设置 → 私人令牌 中生成</small>
                </div>
                <div class="form-group">
                    <label>仓库地址</label>
                    <input type="text" id="cfgRepoUrl"
                        placeholder="如 https://gitee.com/hesir00/quick-tools-warehouse.git">
                    <small>支持 HTTPS 格式的 Gitee 仓库地址</small>
                </div>
                <div id="cfgStatus" class="cfg-status"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" data-close="configModal">取消</button>
                <button class="btn btn-outline" id="btnTestConn">🔌 验证连接</button>
                <button class="btn btn-primary" id="btnSaveConfig">保存配置</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-lg">
            <div class="modal-header">
                <h2 id="editModalTitle">➕ 新增卡片</h2>
                <button class="modal-close" data-close="editModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ID</label>
                    <input type="number" id="editId" placeholder="留空则自动生成">
                    <small>留空则自动生成（当前最大 ID + 1）</small>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="editCardTitle" placeholder="如：单词速记|形容焦虑的英语单词">
                </div>
                <div class="form-group">
                    <label>批量导入</label>
                    <textarea id="batchInput" class="batch-input" placeholder='粘贴 JSON 数组，例如：
[
  {"en": "anxious", "zh": "焦虑的", "ph": "/ˈæŋkʃəs/"},
  {"en": "nervous", "zh": "紧张的", "ph": "/ˈnɜːrvəs/"}
]'></textarea>
                    <div class="batch-actions">
                        <button class="btn btn-outline btn-sm" id="btnBatchParse">📋 解析填充</button>
                        <button class="btn btn-outline btn-sm" id="btnBatchClear">🗑️ 清空输入</button>
                    </div>
                    <small>粘贴 JSON 数组后点击「解析填充」，将自动展开为下方单词列表</small>
                </div>
                <div class="form-group">
                    <label>单词列表</label>
                    <div id="wordsEditor" class="words-editor"></div>
                    <button class="btn btn-outline btn-sm" id="btnAddWord">➕ 添加单词</button>
                </div>
                <div class="form-group">
                    <label>图片</label>
                    <input type="file" id="editImages" multiple accept="image/*">
                    <small>图片将上传到仓库 images/ 目录，通过 raw 链接远程访问</small>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" data-close="editModal">取消</button>
                <button class="btn btn-primary" id="btnSaveCard">💾 保存</button>
            </div>
        </div>
    </div>

    <div id="detailModal" style="display:none;">
        <div class="detail-bg" id="detailBg"></div>
        <button class="detail-close-btn" id="btnCloseDetail">✕</button>
        <div class="container1" id="detailContainer">
            <div class="cards" id="detailCards"></div>
            <div class="folder" id="detailFolder">
                <div class="folder-images" id="detailFolderImages"></div>
                <div class="folder-text">
                    <p class="kicker" id="detailKicker">速记.单词卡</p>
                    <h1>
                        <span id="detailName"></span>
                        <span id="detailInfo"></span>
                    </h1>
                    <span id="detailGroupInfo">18个单词</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/gitee.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
